<!DOCTYPE html><html lang="es"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secuencia del Maniquí — Edición Cinematográfica</title>
    <style>
        :root {
            --bg-color: #030305;
            --accent-red: #660000;
            --bright-red: #ff0a0a;
            --neon-glow: rgba(255, 10, 10, 0.65);
            --text-main: #e6e6ee;
            --rec-color: #ff1212;
            --brass-color: linear-gradient(180deg, #ffe875 0%, #cc9900 40%, #806000 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* --- HUMO AMBIENTAL Y PARTÍCULAS --- */
        .haze-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 40% 50%, rgba(50,50,60,0.15) 0%, transparent 70%);
            z-index: 3;
            pointer-events: none;
            filter: blur(40px);
            animation: haze-drift 15s infinite alternate ease-in-out;
        }

        .dust-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(white, transparent 2px);
            background-size: 80px 80px;
            opacity: 0.15;
            z-index: 2;
            pointer-events: none;
            animation: dust-float 20s infinite linear;
        }

        /* --- PORTADA PRINCIPAL --- */
        .cover-page {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #0a0a10 0%, #010103 100%);
            position: relative;
            z-index: 4;
        }

        /* HUD Profesional */
        .hud-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            border: 20px solid rgba(0, 0, 0, 0.3);
            z-index: 5;
        }

        .cover-hud-rec {
            position: absolute;
            top: 35px;
            left: 45px;
            color: var(--rec-color);
            font-size: 0.85rem;
            font-weight: 900;
            font-family: monospace;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .cover-hud-rec::before {
            content: '';
            width: 12px;
            height: 12px;
            background-color: var(--rec-color);
            border-radius: 50%;
            animation: blink 0.8s infinite;
        }

        /* Arma y Efectos de Disparo */
        .weapon-system {
            position: absolute;
            top: 50px;
            right: 70px;
            width: 240px;
            height: 140px;
            z-index: 10;
        }

        .weapon-silhouette {
            position: absolute;
            right: 0;
            top: 15px;
            width: 170px;
            height: 105px;
            background: linear-gradient(135deg, #1a1a24 0%, #050508 100%);
            clip-path: polygon(0% 18%, 100% 18%, 100% 23%, 98% 26%, 98% 46%, 91% 48%, 88% 50%, 82% 98%, 65% 98%, 71% 52%, 60% 52%, 58% 56%, 52% 56%, 50% 48%, 42% 48%, 41% 32%, 0% 32%);
            opacity: 0.98;
            filter: drop-shadow(-8px 10px 18px rgba(0,0,0,0.95));
        }

        .muzzle-flash {
            position: absolute;
            left: -40px;
            top: 20px;
            width: 65px;
            height: 40px;
            background: radial-gradient(circle, #ffffff 20%, #ffcc00 50%, #ff2200 80%, rgba(255,0,0,0) 100%);
            opacity: 0;
            filter: blur(1px);
            animation: flash-loop 0.35s infinite steps(2);
        }

        /* Título */
        .title-container {
            text-align: center;
            z-index: 10;
        }

        .main-title {
            font-size: 4.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 7px;
            color: #ffffff;
            text-shadow: 0 5px 25px rgba(0,0,0,0.95);
        }

        .title-maniqui {
            color: var(--bright-red);
        }

        .sub-genre {
            display: block;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 8px;
            color: var(--bright-red);
            margin-top: 22px;
        }

        .meta-author {
            font-family: monospace;
            letter-spacing: 6px;
            color: #ff2222;
            font-size: 1.9rem;
            margin-top: 65px;
            text-transform: uppercase;
        }

        /* --- ANIMACIONES DE HUMO Y PARTÍCULAS --- */
        @keyframes haze-drift {
            0% { transform: translateX(-5%) translateY(-5%); }
            100% { transform: translateX(5%) translateY(5%); }
        }

        @keyframes dust-float {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100px); }
        }

        @keyframes flash-loop {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.25); }
        }

        @keyframes blink {
            50% { opacity: 0; }
        }
    </style></head><body>

    <!-- Capa de Humo Ambiental -->
    <div class="haze-layer"></div>
    <!-- Capa de Partículas -->
    <div class="dust-particles"></div>

    <div class="hud-overlay">
        <div class="cover-hud-rec">● LIVE RAW</div>
    </div>

    <div class="cover-page">
        <div class="weapon-system">
            <div class="weapon-silhouette"></div>
            <div class="muzzle-flash"></div>
        </div>

        <div class="title-container">
            <h1 class="main-title">
                Secuencia del <br>
                <span class="title-maniqui">Maniquí</span>
            </h1>
            <span class="sub-genre" contenteditable="true">Psychological Thriller</span>
        </div>

        <div class="meta-author" contenteditable="true">MATIAS MONTILLA</div>
    </div>

</body></html>
